            ? <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(16,185,129,.05)",border:"1px solid rgba(16,185,129,.15)",borderRadius:6,padding:"7px 10px"}}>
                <span style={{fontSize:10,color:"#34d399",display:"flex",alignItems:"center",gap:3}}><Z.Gc/>수정 대기 중 — Push 전까지 변경 가능</span>
                <button onClick={handleUndo} style={{fontSize:9,color:"#71717a",padding:"3px 8px",borderRadius:4,border:"1px solid rgba(63,63,70,.15)",display:"flex",alignItems:"center",gap:2,flexShrink:0,marginLeft:8}}><Z.Rv/>스테이징 취소</button>
              </div>
            : <div>
                <div style={{fontSize:9,fontWeight:600,color:"#71717a",marginBottom:3}}>수정 내용 입력</div>
                <textarea value={ft} onChange={e=>sF(e.target.value)} rows={2}
                  style={{width:"100%",background:"rgba(39,39,42,.3)",border:"1px solid rgba(63,63,70,.15)",borderRadius:6,padding:7,fontSize:11,color:"#e4e4e7",outline:"none",resize:"none"}}/>
                <div style={{display:"flex",gap:4,marginTop:5,justifyContent:"space-between"}}>
                  <button onClick={handleUndo} style={{fontSize:9,color:"#71717a",padding:"4px 9px",borderRadius:4,border:"1px solid rgba(63,63,70,.12)",display:"flex",alignItems:"center",gap:3}}><Z.Rv/>결정 취소</button>
                  <button onClick={()=>onSt({...it,fixedText:ft})} disabled={!ft.trim()||ft===it.ot}
                    style={{display:"flex",alignItems:"center",gap:3,fontSize:10,fontWeight:600,color:"#fff",background:ft.trim()&&ft!==it.ot?"#059669":"#27272a",padding:"4px 12px",borderRadius:5}}>
                    <Z.Gc/>Commit
                  </button>
                </div>
              </div>
          }
        </div>}
      </div>
    </div>}
  </div>);
}

/* ═══ NEW PROJECT VIEW ═══ */
function NewProj({files,onAF,onRF,onBG,gB,onAn}){
  const[sg,sS]=useState(true);const hW=files.worldview.length>0||files.settings.length>0,hS=files.scenario.length>0,hA=hW||hS,aB=gB.ws||gB.sc;
  return(<div className="fade" style={{display:"flex",flexDirection:"column",gap:16}}>
    <h2 style={{fontSize:18,fontWeight:900,color:"#fff"}}>새 프로젝트</h2>
    {sg&&<Onb onClose={()=>sS(false)}/>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>{Object.keys(CT).map(k=><CUp key={k} ck={k} files={files[k]} onA={onAF} onR={onRF}/>)}</div>
    {hA&&<div style={{display:"grid",gridTemplateColumns:hW&&hS?"1fr 1fr":"1fr",gap:7}}>
      {hW&&<button onClick={()=>onBG("ws")} style={{padding:10,borderRadius:8,border:`1px solid ${gB.ws?"rgba(139,92,246,.2)":"rgba(63,63,70,.12)"}`,background:gB.ws?"rgba(139,92,246,.04)":"rgba(39,39,42,.08)",fontSize:11,fontWeight:600,color:gB.ws?"#a78bfa":"#e4e4e7"}}>{gB.ws?"✅ 세계관·설정 완료":"🌍📋 GraphRAG 구축"}</button>}
      {hS&&<button onClick={()=>onBG("sc")} style={{padding:10,borderRadius:8,border:`1px solid ${gB.sc?"rgba(52,211,153,.2)":"rgba(63,63,70,.12)"}`,background:gB.sc?"rgba(52,211,153,.04)":"rgba(39,39,42,.08)",fontSize:11,fontWeight:600,color:gB.sc?"#34d399":"#e4e4e7"}}>{gB.sc?"✅ 시나리오 완료":"🎬 GraphRAG 구축"}</button>}
    </div>}
    {aB&&<button onClick={onAn} style={{width:"100%",padding:"11px 0",borderRadius:9,fontWeight:600,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5,background:"linear-gradient(90deg,#059669,#0d9488)",color:"#fff"}}><Z.Se/>모순 탐지 시작</button>}
  </div>);
}

/* ═══ PROJECT VIEW ═══ */
function ProjView({proj,tab,setTab,staged,onSt,onUs,onPu,onCl,onAn,showAi,setShowAi,onReupload}){
  const[fi,sF]=useState("all");
  const[verEx,sVE]=useState({});
  const vUpRef=useRef(null);
  const ct=proj.contradictions||[];
  const sIds=new Set(staged.map(s=>s.id));
  const ver=proj.versions||[];
  const fd=fi==="all"?ct:ct.filter(c=>c.sv===fi);
  const cn={all:ct.length,critical:ct.filter(c=>c.sv==="critical").length,warning:ct.filter(c=>c.sv==="warning").length,info:ct.filter(c=>c.sv==="info").length};
  const toggleVer=(vid,type)=>sVE(p=>({...p,[vid]:p[vid]===type?null:type}));
  const mockDiff=()=>(<div style={{fontFamily:"'JetBrains Mono',monospace"}}><span className="diff-ctx">  Ch.2 Scene 4</span><span className="diff-del">- D: "왜요? 아직 증거가 없잖아요."</span><span className="diff-add">+ D: (속으로: '아직 결과가 없는데...') "왜요? 아직 증거가 없잖아요."</span><span className="diff-ctx">  ...</span></div>);

  return(<div className="fade" style={{display:"flex",flexDirection:"column",gap:14,height:"100%"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div><h2 style={{fontSize:17,fontWeight:900,color:"#fff"}}>{proj.name}</h2><p style={{color:"#52525b",fontSize:10}}>{proj.date}</p></div>
      <button onClick={()=>setShowAi(!showAi)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:9,background:showAi?"linear-gradient(135deg,#059669,#0d9488)":"linear-gradient(135deg,rgba(16,185,129,.15),rgba(13,148,136,.15))",border:showAi?"none":"1px solid rgba(16,185,129,.3)",color:"#fff",fontSize:12,fontWeight:600,boxShadow:showAi?"0 4px 16px rgba(16,185,129,.3)":"0 2px 8px rgba(16,185,129,.1)",transition:"all .2s"}}>
        <Z.AI/>{showAi?"AI 질의 닫기":"AI 질의"}
      </button>
    </div>

    <div style={{display:"flex",gap:3}}>
      {[{k:"overview",l:"개요"},{k:"contradictions",l:`모순 ${ct.length>0?ct.length:""}`},{k:"versions",l:"버전"}].map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"5px 12px",borderRadius:6,fontSize:11,fontWeight:600,color:tab===t.k?"#34d399":"#71717a",background:tab===t.k?"rgba(16,185,129,.08)":"transparent",border:tab===t.k?"1px solid rgba(16,185,129,.12)":"1px solid transparent"}}>{t.l}</button>)}
    </div>

    <div style={{flex:1,overflow:"auto",display:"grid",gridTemplateColumns:showAi?"1fr 380px":"1fr",gap:14}}>
      <div style={{overflow:"auto",display:"flex",flexDirection:"column",gap:12}}>

        {/* 개요 */}
        {tab==="overview"&&<>
          <KBS st={proj.kb}/>
          <SrcL sources={proj.sources} onReupload={onReupload}/>
          {ct.length===0&&<button onClick={onAn} style={{width:"100%",padding:"11px 0",borderRadius:9,fontWeight:600,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5,background:"linear-gradient(90deg,#059669,#0d9488)",color:"#fff"}}><Z.Se/>모순 탐지 시작</button>}
          {ct.length>0&&<div style={{background:"rgba(239,68,68,.04)",border:"1px solid rgba(239,68,68,.12)",borderRadius:9,padding:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><span style={{fontSize:12,fontWeight:600,color:"#f87171"}}>{ct.length}건의 모순</span><span style={{fontSize:10,color:"#52525b",marginLeft:6}}>발견됨</span></div>
            <button onClick={()=>setTab("contradictions")} style={{fontSize:11,color:"#f87171",padding:"5px 12px",borderRadius:6,border:"1px solid rgba(239,68,68,.2)",fontWeight:600}}>결과 보기 →</button>
          </div>}
        </>}

        {/* 모순 */}
        {tab==="contradictions"&&<>
          <Stg staged={staged} onRm={onUs} onPush={onPu} onClr={onCl}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {[{k:"all",l:"전체"},{k:"critical",l:"심각"},{k:"warning",l:"주의"},{k:"info",l:"참고"}].map(f=><button key={f.k} onClick={()=>sF(f.k)} style={{display:"flex",alignItems:"center",gap:2,padding:"3px 8px",borderRadius:5,fontSize:10,fontWeight:600,...(fi===f.k?(f.k==="all"?{background:"#3f3f46",color:"#fff"}:{background:SV[f.k].bg,color:SV[f.k].tx,border:`1px solid ${SV[f.k].bd}`}):{background:"rgba(39,39,42,.2)",color:"#52525b"})}}>{f.l}<span className="mono" style={{fontSize:7,background:"rgba(9,9,14,.25)",padding:"0 3px",borderRadius:2}}>{cn[f.k]}</span></button>)}
          </div>
          {fd.map(c=><CC key={c.id} it={c} onSt={onSt} onUs={onUs} isSt={sIds.has(c.id)}/>)}
          {fd.length===0&&<div style={{textAlign:"center",padding:"28px 0",color:"#3f3f46",fontSize:11}}>모순이 없습니다</div>}
        </>}

        {/* 버전 (v4: 파일로 새 버전 만들기 + 인라인 원고/diff) */}
        {tab==="versions"&&<div>
          {/* 파일로 새 버전 만들기 버튼 */}
          <div style={{marginBottom:14,display:"flex",gap:6}}>
            <input ref={vUpRef} type="file" accept=".txt,.pdf" style={{display:"none"}}
              onChange={e=>{if(e.target.files[0]){onReupload(null,null,e.target.files[0].name);e.target.value=""}}}/>
            <button onClick={()=>vUpRef.current?.click()}
              style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:7,border:"1px dashed rgba(139,92,246,.3)",background:"rgba(124,58,237,.04)",color:"#a78bfa",fontSize:11,fontWeight:600}}>
              <Z.Up2/>파일로 새 버전 만들기
            </button>
            <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:"#52525b"}}>
              <Z.In/>수정된 파일을 업로드하면 새 버전으로 등록되고 GraphRAG가 증분 업데이트됩니다
            </div>
          </div>

          <div style={{paddingLeft:20,position:"relative"}}>
            <div style={{position:"absolute",left:5,top:5,bottom:5,width:2,background:"rgba(63,63,70,.2)",borderRadius:1}}/>
            {ver.map((v,i)=><div key={v.id} style={{position:"relative",marginBottom:12}}>
              <div style={{position:"absolute",left:-17,top:4,width:9,height:9,borderRadius:5,background:i===0?"#10b981":"#3f3f46",border:i===0?"2px solid rgba(16,185,129,.25)":"2px solid #27272a"}}/>
              <div style={{background:i===0?"rgba(16,185,129,.03)":"rgba(39,39,42,.08)",border:`1px solid ${i===0?"rgba(16,185,129,.1)":"rgba(63,63,70,.06)"}`,borderRadius:8,padding:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span className="mono" style={{fontSize:11,fontWeight:700,color:i===0?"#34d399":"#a1a1aa"}}>{v.vr}</span>
                    {i===0&&<span style={{fontSize:7,background:"rgba(16,185,129,.08)",color:"#34d399",padding:"1px 4px",borderRadius:2}}>최신</span>}
                    {v.fx>0&&<span style={{fontSize:7,background:"rgba(245,158,11,.06)",color:"#fbbf24",padding:"1px 4px",borderRadius:2}}>{v.fx}수정</span>}
                    {v.src&&<span style={{fontSize:7,background:"rgba(39,39,42,.2)",color:"#52525b",padding:"1px 4px",borderRadius:2}}>{v.src}</span>}
                  </div>
                  <span style={{fontSize:9,color:"#52525b"}}>{v.dt}</span>
                </div>
                <p style={{fontSize:10,color:"#d4d4d8",marginBottom:6}}>{v.ds}</p>
                <div style={{display:"flex",gap:3}}>
                  <button onClick={()=>toggleVer(v.id,"content")}
                    style={{fontSize:8,padding:"2px 7px",borderRadius:3,border:`1px solid ${verEx[v.id]==="content"?"rgba(16,185,129,.3)":"rgba(63,63,70,.1)"}`,color:verEx[v.id]==="content"?"#34d399":"#52525b",background:verEx[v.id]==="content"?"rgba(16,185,129,.06)":"transparent",display:"flex",alignItems:"center",gap:2}}
                  ><Z.Bk/>원고 보기</button>
                  {i>0&&<button onClick={()=>toggleVer(v.id,"diff")}
                    style={{fontSize:8,padding:"2px 7px",borderRadius:3,border:`1px solid ${verEx[v.id]==="diff"?"rgba(245,158,11,.3)":"rgba(63,63,70,.1)"}`,color:verEx[v.id]==="diff"?"#fbbf24":"#52525b",background:verEx[v.id]==="diff"?"rgba(120,53,15,.08)":"transparent",display:"flex",alignItems:"center",gap:2}}
                  ><Z.Df/>비교</button>}
                </div>
                {verEx[v.id]==="content"&&<div className="fade" style={{marginTop:8,background:"rgba(9,9,14,.5)",border:"1px solid rgba(63,63,70,.15)",borderRadius:6,padding:10,maxHeight:180,overflow:"auto"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:9,fontWeight:600,color:"#34d399",display:"flex",alignItems:"center",gap:3}}><Z.Bk/>{v.vr} 원고</span>
                    <span style={{fontSize:8,color:"#3f3f46"}}>GET /api/versions/{v.id}/content</span>
                  </div>
                  <pre style={{fontSize:10,color:"#d4d4d8",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{v.content||"(내용 없음)"}</pre>
                </div>}
                {verEx[v.id]==="diff"&&<div className="fade" style={{marginTop:8,background:"rgba(9,9,14,.5)",border:"1px solid rgba(63,63,70,.15)",borderRadius:6,padding:10,maxHeight:180,overflow:"auto"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:9,fontWeight:600,color:"#fbbf24",display:"flex",alignItems:"center",gap:3}}><Z.Df/>이전 버전과 비교</span>
                    <span style={{fontSize:8,color:"#3f3f46"}}>GET /api/versions/{ver[i+1]?.id}/diff/{v.id}</span>
                  </div>
                  {v.fx>0?mockDiff():<p style={{fontSize:10,color:"#52525b"}}>변경 없음</p>}
                </div>}
              </div>
            </div>)}
          </div>
        </div>}
      </div>
      {showAi&&<AiChat/>}
    </div>
  </div>);
}

/* ═══ APP ═══ */
function App(){
  const[projects,setProjects]=useState(MOCK_PROJECTS);
  const[activeId,setActiveId]=useState("p1");
  const[isNew,setIsNew]=useState(false);
  const[tab,setTab]=useState("overview");
  const[staged,setStaged]=useState([]);
  const[showAi,setShowAi]=useState(false);
  const[pr,sPr]=useState(null);
  const[nFiles,setNF]=useState({worldview:[],settings:[],scenario:[]});
  const[nGB,setNGB]=useState({ws:false,sc:false});
  const fi=useRef(0);const vi=useRef(10);

  const activeProj=projects.find(p=>p.id===activeId);
  const run=(steps,title,cb)=>{sPr({steps,step:0,title});let s=0;const iv=setInterval(()=>{s++;sPr(p=>({...p,step:s}));if(s>=steps.length){clearInterval(iv);setTimeout(()=>{sPr(null);cb()},300)}},steps[s]?.ms||1e3)};

  const onSelectProj=(id)=>{setActiveId(id);setIsNew(false);setTab("overview");setStaged([]);setShowAi(false)};
  const onNewProj=()=>{setIsNew(true);setActiveId(null);setNF({worldview:[],settings:[],scenario:[]});setNGB({ws:false,sc:false});setTab("overview");setStaged([]);setShowAi(false)};
  const onAF=(c,nf)=>{const a=nf.map(f=>({id:"f"+(++fi.current),name:f.name}));setNF(p=>({...p,[c]:[...p[c],...a]}))};
  const onRF=(c,id)=>setNF(p=>({...p,[c]:p[c].filter(f=>f.id!==id)}));
  const onBG=t=>{run(t==="ws"?IW:IS,t==="ws"?"세계관·설정 GraphRAG 구축":"시나리오 GraphRAG 구축",()=>{setNGB(p=>({...p,[t]:true}))})};
  const onNewAnalyze=()=>{run(AS,"모순 탐지 분석 중",()=>{
    const np={id:"p"+(projects.length+1),name:"새 프로젝트 "+(projects.length+1),date:new Date().toISOString().slice(0,10),
      kb:{characters:Math.floor(Math.random()*10+3),facts:Math.floor(Math.random()*30+10),relationships:Math.floor(Math.random()*40+15),events:Math.floor(Math.random()*60+20),traits:Math.floor(Math.random()*15+5)},
      sources:Object.entries(nFiles).flatMap(([cat,fs])=>fs.map(f=>({id:f.id,n:f.name,cat,ent:Math.floor(Math.random()*20+5),fct:Math.floor(Math.random()*15+5)}))),
      graphBuilt:nGB,contradictions:[],versions:[{id:"v"+(++vi.current),vr:"v1.0",dt:new Date().toLocaleString("ko-KR"),fx:0,ds:"최초 업로드",src:"",content:""}]};
    setProjects(p=>[np,...p]);setActiveId(np.id);setIsNew(false);setTab("overview");
  })};

  const onAnalyze=()=>{if(!activeProj)return;run(AS,"모순 탐지 분석 중",()=>{
    const updated={...activeProj,contradictions:MOCK_PROJECTS[0].contradictions};
    setProjects(p=>p.map(x=>x.id===updated.id?updated:x));setTab("contradictions");
  })};
  const onSt=fx=>setStaged(p=>{if(p.find(s=>s.id===fx.id))return p.map(s=>s.id===fx.id?fx:s);return[...p,fx]});
  const onUs=id=>setStaged(p=>p.filter(s=>s.id!==id));
  const onPu=()=>{if(!activeProj)return;run(RS,"수정사항 반영 및 GraphRAG 재구축",()=>{
    const ids=new Set(staged.map(s=>s.id));
    const nv={id:"v"+(++vi.current),vr:`v1.${activeProj.versions.length}`,dt:new Date().toLocaleString("ko-KR"),fx:staged.length,ds:`텍스트 수정 ${staged.length}건 반영`,src:activeProj.versions[0]?.src||"",content:""};
    const updated={...activeProj,contradictions:activeProj.contradictions.filter(c=>!ids.has(c.id)),versions:[nv,...activeProj.versions]};
    setProjects(p=>p.map(x=>x.id===updated.id?updated:x));setStaged([]);
  })};
  const onCl=()=>setStaged([]);

  /* v4: 파일 재업로드 → 새 버전 생성 */
  const onReupload=(srcId,srcName,fileName)=>{
    if(!activeProj)return;
    run(RS,"파일 업로드 및 GraphRAG 재구축",()=>{
      const vn=activeProj.versions.length;
      const nv={
        id:"v"+(++vi.current),
        vr:`v1.${vn}`,
        dt:new Date().toLocaleString("ko-KR"),
        fx:0,
        ds:`파일 업로드: ${fileName}`,
        src:fileName,
        content:`...[${fileName} 원고 내용]\n\n(업로드된 파일 기반으로 GraphRAG 재구축 완료)`,
      };
      const updated={...activeProj,versions:[nv,...activeProj.versions]};
      setProjects(p=>p.map(x=>x.id===updated.id?updated:x));
      setTab("versions");
    });
  };

  return(<div style={{display:"flex",height:"100vh",background:"#09090b"}}>
    <Sidebar projects={projects} activeId={activeId} onSelect={onSelectProj} onNew={onNewProj}/>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <header style={{height:46,borderBottom:"1px solid rgba(63,63,70,.15)",background:"rgba(9,9,11,.8)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",flexShrink:0}}>
        <span style={{fontSize:11,color:"#52525b"}}>{isNew?"새 프로젝트 생성":activeProj?.name||""}</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {staged.length>0&&<span style={{fontSize:9,color:"#34d399",display:"flex",alignItems:"center",gap:2}}><Z.Gc/>{staged.length}건 스테이징</span>}
          <div className="pulse" style={{width:6,height:6,borderRadius:3,background:"#10b981"}}/>
        </div>
      </header>
      <main style={{flex:1,overflow:"auto",padding:20}}>
        {isNew&&<NewProj files={nFiles} onAF={onAF} onRF={onRF} onBG={onBG} gB={nGB} onAn={onNewAnalyze}/>}
        {!isNew&&activeProj&&<ProjView proj={activeProj} tab={tab} setTab={setTab} staged={staged} onSt={onSt} onUs={onUs} onPu={onPu} onCl={onCl} onAn={onAnalyze} showAi={showAi} setShowAi={setShowAi} onReupload={onReupload}/>}
        {!isNew&&!activeProj&&<div style={{textAlign:"center",padding:"60px 0",color:"#3f3f46"}}><p>프로젝트를 선택하거나 새 프로젝트를 생성하세요</p></div>}
      </main>
    </div>
    {pr&&<Prog step={pr.step} steps={pr.steps} title={pr.title}/>}
  </div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
