<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ContiCheck</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#fdfaf5;color:#2c2416;height:100vh;overflow:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
textarea,input{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ede4d8;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade{animation:fadeUp .25s ease-out}
.spin{animation:spin 1s linear infinite}
.pulse{animation:pulse 2s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect} = React;

const MOCK = [{
  id:"p1",name:"그림자의 비밀 시즌1",date:"2026-03-10",
  kb:{characters:12,facts:47,relationships:83,events:156},
  sources:[
    {id:"s1",n:"판타지_세계관_설정.pdf",cat:"worldview",ent:18,fct:22},
    {id:"s2",n:"캐릭터_설정집_v2.txt",cat:"settings",ent:14,fct:19},
    {id:"s3",n:"그림자의_비밀_시즌1.pdf",cat:"scenario",ent:34,fct:47}
  ],
  contradictions:[
    {id:"c1",level:"high",type:"정보 흐름",char:"형사 A",
     summary:"A가 아직 모를 정보를 먼저 알고 있어요",
     quote:'"D, 나 B가 범인인 것 같아."',
     explain:"A가 B를 범인으로 지목하는 장면인데, 이 시점에서 A는 C의 고백을 아직 듣지 못했어요. C의 고백 이전에 A가 이 사실을 아는 것은 앞뒤가 맞지 않아요.",
     evidence:[{src:"그림자의_비밀_시즌1.pdf",loc:"2장 58쪽",text:"C는 범인의 키와 옷차림만 전달"}],
     suggestion:"C의 고백 장면 이후로 이 대사를 옮기거나, 이전에 A가 B를 의심할 단서를 추가해보세요.",
     needsAuthor:false,ot:"A: D, 나 B가 범인인 것 같아."},
    {id:"c2",level:"high",type:"정보 흐름",char:"형사 A",
     summary:"A가 목격하지 못한 장면을 알고 있어요",
     quote:'"C가 위협받고 있는 것 같아."',
     explain:"B가 C를 위협하는 장면에 A는 없었어요. 그런데 A가 이 사실을 알고 있는 것처럼 말하고 있어요.",
     evidence:[{src:"그림자의_비밀_시즌1.pdf",loc:"2장 71쪽",text:"A와 D는 이 장면을 모른다고 서술됨"}],
     suggestion:"C가 A에게 전화하거나 문자를 보내는 장면을 추가하면 자연스러워져요.",
     needsAuthor:false,ot:"A: C가 위협받고 있는 것 같아."},
    {id:"c3",level:"medium",type:"인물 행동",char:"파트너 D",
     summary:"D의 반응이 이전 행동과 맞지 않아요",
     quote:'"왜요? 아직 증거가 없잖아요."',
     explain:"D는 이미 B의 알리바이를 조사하고 있었는데, 정작 B에 대한 이야기가 나왔을 때 모르는 척 놀라는 반응을 보이고 있어요.",
     evidence:[{src:"그림자의_비밀_시즌1.pdf",loc:"2장 65쪽",text:'D: "B씨 알리바이를 확인해봐야겠어."'}],
     suggestion:"D가 결과를 숨기는 이유를 암시하는 장면을 추가하면 의도적인 복선으로 만들 수 있어요.",
     needsAuthor:true,authorQ:"D의 이 반응은 의도적으로 숨기는 건가요, 아니면 실수인가요?",
     ot:"D: 왜요? 아직 증거가 없잖아요."}
  ],
  versions:[
    {id:"v2",label:"v1.1",date:"2026-03-10 오후 6:00",fixes:1,desc:"D의 반응 장면에 내면 독백 추가"},
    {id:"v1",label:"v1.0",date:"2026-03-08",fixes:0,desc:"처음 업로드"}
  ]
},{
  id:"p2",name:"용의 후예 파일럿",date:"2026-03-06",
  kb:{characters:5,facts:12,relationships:18,events:34},
  sources:[{id:"s4",n:"용의후예_세계관.txt",cat:"worldview",ent:8,fct:10}],
  contradictions:[],
  versions:[{id:"v1",label:"v1.0",date:"2026-03-06",fixes:0,desc:"처음 업로드"}]
}];

const SW=[{l:"세계관 파일 읽는 중...",ms:900},{l:"규칙과 설정 파악 중...",ms:1800},{l:"인물과 관계 정리 중...",ms:1400},{l:"지식 그래프에 저장 중...",ms:1100}];
const SS=[{l:"시나리오 파일 읽는 중...",ms:900},{l:"장면과 대사 분석 중...",ms:1800},{l:"사건 흐름 정리 중...",ms:1500},{l:"지식 그래프에 저장 중...",ms:1100}];
const SA=[{l:"등장인물 정보 확인 중...",ms:900},{l:"사건 흐름 비교 중...",ms:1400},{l:"모순 패턴 분석 중...",ms:2000},{l:"AI 검증 중...",ms:1800},{l:"결과 정리 중...",ms:600}];
const SP=[{l:"원고에 수정사항 반영 중...",ms:800},{l:"변경 부분 재분석 중...",ms:1200},{l:"지식 그래프 업데이트 중...",ms:1400},{l:"완료!",ms:500}];

function Loading({step,steps,title}){
  return React.createElement('div',{style:{position:"fixed",inset:0,background:"rgba(253,250,245,.9)",backdropFilter:"blur(6px)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}},
    React.createElement('div',{style:{background:"#fff",border:"1px solid #ede4d8",borderRadius:20,padding:32,maxWidth:360,width:"90%",boxShadow:"0 8px 32px rgba(44,36,22,.12)"}},
      React.createElement('div',{style:{textAlign:"center",marginBottom:24}},
        React.createElement('div',{style:{width:48,height:48,borderRadius:"50%",background:"#fdeee6",border:"2px solid #e8905e",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",color:"#c4622d",fontSize:20,className:"spin"}},"⟳"),
        React.createElement('h3',{style:{fontSize:15,fontWeight:700,fontFamily:"'Noto Serif KR',serif"}},title)
      ),
      React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
        steps.map((s,i)=>React.createElement('div',{key:i,style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement('div',{style:{width:22,height:22,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,
            ...(i<step?{background:"#2d7a56",color:"#fff"}:i===step?{background:"#fdeee6",border:"2px solid #c4622d",color:"#c4622d"}:{background:"#f5efe6",color:"#a89880"})
          }},i<step?"✓":i+1),
          React.createElement('span',{style:{fontSize:12,color:i===step?"#2c2416":"#a89880",fontWeight:i===step?600:400}},s.l)
        ))
      ),
      React.createElement('div',{style:{marginTop:20,height:4,background:"#f5efe6",borderRadius:2,overflow:"hidden"}},
        React.createElement('div',{style:{height:"100%",background:"linear-gradient(90deg,#c4622d,#e8905e)",borderRadius:2,transition:"width .5s",width:((step+1)/steps.length*100)+"%"}})
      )
    )
  );
}

function App(){
  const [projects,setProjects]=useState(MOCK);
  const [activeId,setActiveId]=useState("p1");
  const [isNew,setIsNew]=useState(false);
  const [tab,setTab]=useState("overview");
  const [staged,setStaged]=useState([]);
  const [showAi,setShowAi]=useState(false);
  const [loading,setLoading]=useState(null);
  const [filter,setFilter]=useState("all");
  const [openCards,setOpenCards]=useState({});
  const [editCards,setEditCards]=useState({});
  const [fixTexts,setFixTexts]=useState({});
  const [aiMsgs,setAiMsgs]=useState([{role:"s",text:"안녕하세요! 작품의 인물, 설정, 사건에 대해 무엇이든 물어보세요 😊"}]);
  const [aiInput,setAiInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [nFiles,setNFiles]=useState({worldview:[],settings:[],scenario:[]});
  const [nBuilt,setNBuilt]=useState({ws:false,sc:false});
  const [authorAnswers,setAuthorAnswers]=useState({});
  const [authorInputs,setAuthorInputs]=useState({});
  const fid=useRef(0);
  const aiEndRef=useRef(null);
  const activeProj=projects.find(p=>p.id===activeId);

  useEffect(()=>{aiEndRef.current?.scrollIntoView({behavior:"smooth"})},[aiMsgs]);

  const run=(steps,title,cb)=>{
    setLoading({steps,step:0,title});
    let s=0;
    const iv=setInterval(()=>{
      s++;setLoading(p=>({...p,step:s}));
      if(s>=steps.length){clearInterval(iv);setTimeout(()=>{setLoading(null);cb()},400);}
    },steps[s]?.ms||1000);
  };

  const onSelect=(id)=>{setActiveId(id);setIsNew(false);setTab("overview");setStaged([]);setShowAi(false);setFilter("all")};
  const onNew=()=>{setIsNew(true);setActiveId(null);setNFiles({worldview:[],settings:[],scenario:[]});setNBuilt({ws:false,sc:false});setStaged([]);setShowAi(false)};
  const onBuild=(t)=>run(t==="ws"?SW:SS,t==="ws"?"세계관·설정 분석 중...":"시나리오 분석 중...",()=>setNBuilt(p=>({...p,[t]:true})));

  const onNewAnalyze=()=>run(SA,"모순 탐지 중...",()=>{
    const np={id:"p"+(projects.length+1),name:"새 작품 "+(projects.length+1),date:new Date().toISOString().slice(0,10),
      kb:{characters:Math.floor(Math.random()*10+3),facts:Math.floor(Math.random()*30+10),relationships:Math.floor(Math.random()*40+15),events:Math.floor(Math.random()*60+20)},
      sources:Object.entries(nFiles).flatMap(([cat,fs])=>fs.map(f=>({id:f.id,n:f.name,cat,ent:Math.floor(Math.random()*20+5),fct:Math.floor(Math.random()*15+5)}))),
      contradictions:[],versions:[{id:"v1",label:"v1.0",date:new Date().toLocaleDateString("ko-KR"),fixes:0,desc:"처음 업로드"}]};
    setProjects(p=>[np,...p]);setActiveId(np.id);setIsNew(false);setTab("overview");
  });

  const onAnalyze=()=>{if(!activeProj)return;run(SA,"모순 탐지 중...",()=>{
    setProjects(p=>p.map(x=>x.id===activeProj.id?{...x,contradictions:MOCK[0].contradictions}:x));setTab("contradictions");
  })};

  const onStage=(item)=>setStaged(p=>{
    const fx=fixTexts[item.id]||item.ot||"";
    const fix={...item,fixedText:fx};
    if(p.find(s=>s.id===item.id))return p.map(s=>s.id===item.id?fix:s);
    return[...p,fix];
  });
  const onClear=()=>setStaged([]);
  const onPush=()=>{if(!activeProj)return;run(SP,"원고에 반영 중...",()=>{
    const ids=new Set(staged.map(s=>s.id));
    const nv={id:"v"+(activeProj.versions.length+1),label:"v1."+activeProj.versions.length,date:new Date().toLocaleDateString("ko-KR"),fixes:staged.length,desc:staged.length+"건 수정 반영"};
    setProjects(p=>p.map(x=>x.id===activeProj.id?{...x,contradictions:x.contradictions.filter(c=>!ids.has(c.id)),versions:[nv,...x.versions]}:x));
    setStaged([]);
  })};

  const sendAi=()=>{
    if(!aiInput.trim()||aiLoading)return;
    const q=aiInput.trim();setAiInput("");setAiLoading(true);
    setAiMsgs(p=>[...p,{role:"u",text:q}]);
    setTimeout(()=>{setAiMsgs(p=>[...p,{role:"a",text:"작품의 지식 그래프를 확인했습니다.\n현재 등록된 정보를 바탕으로 분석 결과를 알려드릴게요."}]);setAiLoading(false);},1500);
  };

  const ct=activeProj?.contradictions||[];
  const sids=new Set(staged.map(s=>s.id));
  const fd=filter==="all"?ct:ct.filter(c=>c.level===filter);
  const counts={all:ct.length,high:ct.filter(c=>c.level==="high").length,medium:ct.filter(c=>c.level==="medium").length};

  const catInfo={worldview:{label:"세계관",icon:"🌍",desc:"세계 규칙, 역사, 설정"},settings:{label:"설정집",icon:"📋",desc:"인물 프로필, 관계도"},scenario:{label:"시나리오",icon:"🎬",desc:"실제 대본, 원고"}};

  const s=(obj)=>Object.assign({},obj);

  return(
    <div style={{display:"flex",height:"100vh",background:"#fdfaf5"}}>

      {/* 사이드바 */}
      <div style={{width:240,borderRight:"1px solid #ede4d8",background:"#fff8f0",display:"flex",flexDirection:"column",height:"100vh",flexShrink:0}}>
        <div style={{padding:"18px 16px 14px",borderBottom:"1px solid #ede4d8",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:"#c4622d",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{color:"#fff",fontSize:13,fontWeight:900,fontFamily:"'Noto Serif KR',serif"}}>C</span>
          </div>
          <div>
            <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:14,fontWeight:700}}>ContiCheck</div>
            <div style={{fontSize:9,color:"#a89880"}}>이야기 정합성 검사</div>
          </div>
        </div>
        <div style={{padding:"12px 12px 8px"}}>
          <button onClick={onNew} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px dashed #ede4d8",color:"#c4622d",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="#fdeee6"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            ＋ 새 작품 분석하기
          </button>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"4px 8px"}}>
          <div style={{fontSize:9,fontWeight:700,color:"#a89880",padding:"6px 8px 4px",letterSpacing:".06em"}}>내 작품</div>
          {projects.map(p=>{
            const act=p.id===activeId;
            const cc=p.contradictions?.length||0;
            return(
              <button key={p.id} onClick={()=>onSelect(p.id)} style={{width:"100%",textAlign:"left",padding:"10px 12px",borderRadius:10,marginBottom:2,background:act?"#fdeee6":"transparent",border:act?"1px solid rgba(196,98,45,.2)":"1px solid transparent",transition:"all .15s"}}
                onMouseEnter={e=>{if(!act)e.currentTarget.style.background="#f5efe6"}}
                onMouseLeave={e=>{if(!act)e.currentTarget.style.background="transparent"}}>
                <div style={{fontSize:12,fontWeight:act?700:500,color:act?"#c4622d":"#2c2416",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#a89880"}}>
                  <span>{p.date}</span>
                  {cc>0&&<span style={{color:"#b83232",fontWeight:600}}>⚠ {cc}건</span>}
                  {cc===0&&p.sources?.length>0&&<span style={{color:"#2d7a56"}}>✓ 이상 없음</span>}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* 메인 */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{height:48,borderBottom:"1px solid #ede4d8",background:"#fff8f0",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",flexShrink:0}}>
          <span style={{fontSize:12,color:"#a89880"}}>{isNew?"새 작품 분석":activeProj?.name||""}</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {staged.length>0&&<span style={{fontSize:11,color:"#2d7a56",fontWeight:600}}>✅ {staged.length}건 수정 대기 중</span>}
            <div className="pulse" style={{width:6,height:6,borderRadius:"50%",background:"#2d7a56"}}></div>
            <span style={{fontSize:10,color:"#a89880"}}>연결됨</span>
          </div>
        </header>

        <main style={{flex:1,overflow:"auto",padding:24}}>

          {/* 새 작품 */}
          {isNew&&(
            <div className="fade" style={{display:"flex",flexDirection:"column",gap:20,maxWidth:700}}>
              <div>
                <h2 style={{fontFamily:"'Noto Serif KR',serif",fontSize:22,fontWeight:700,marginBottom:6}}>새 작품 분석 시작하기</h2>
                <p style={{fontSize:13,color:"#6b5c47",lineHeight:1.7}}>분석할 파일을 올려주세요. 세계관이나 설정집이 있으면 더 정확하게 분석할 수 있어요.</p>
              </div>
              <div style={{background:"#fef3db",border:"1px solid rgba(196,124,26,.2)",borderRadius:12,padding:14}}>
                <div style={{fontSize:12,fontWeight:600,color:"#c47c1a",marginBottom:8}}>💡 이렇게 하면 더 좋아요</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {[{label:"시나리오만",items:["🎬"],q:"기본",c:"#a89880"},{label:"설정집 포함",items:["📋","🎬"],q:"더 정확",c:"#c47c1a"},{label:"전체 포함",items:["🌍","📋","🎬"],q:"가장 정확 ⭐",c:"#c4622d"}].map(x=>(
                    <div key={x.label} style={{background:"rgba(255,255,255,.6)",borderRadius:8,padding:10,textAlign:"center"}}>
                      <div style={{fontSize:9,fontWeight:700,color:x.c,marginBottom:3}}>{x.q}</div>
                      <div style={{fontSize:11,fontWeight:600,marginBottom:4}}>{x.label}</div>
                      <div style={{display:"flex",justifyContent:"center",gap:2}}>{x.items.map(i=><span key={i} style={{fontSize:16}}>{i}</span>)}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                {["worldview","settings","scenario"].map(cat=>{
                  const c=catInfo[cat];
                  const r=React.createRef();
                  return(
                    <div key={cat}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:18}}>{c.icon}</span>
                        <div><div style={{fontSize:12,fontWeight:600}}>{c.label}</div><div style={{fontSize:10,color:"#a89880"}}>{c.desc}</div></div>
                      </div>
                      <div style={{border:"2px dashed #ede4d8",borderRadius:8,padding:"16px 10px",textAlign:"center",cursor:"pointer",background:"#fff8f0",transition:"all .2s"}}
                        onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.multiple=true;inp.accept=".txt,.pdf";inp.onchange=e=>{const a=Array.from(e.target.files).map(f=>({id:"f"+(++fid.current),name:f.name}));setNFiles(p=>({...p,[cat]:[...p[cat],...a]}))};inp.click()}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor="#c4622d";e.currentTarget.style.background="#fdeee6"}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor="#ede4d8";e.currentTarget.style.background="#fff8f0"}}>
                        <div style={{fontSize:22,marginBottom:4}}>📁</div>
                        <div style={{fontSize:11,color:"#a89880"}}>클릭하거나 파일을 놓으세요</div>
                        <div style={{fontSize:9,color:"#a89880",marginTop:2}}>.txt / .pdf</div>
                      </div>
                      {nFiles[cat].length>0&&(
                        <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:3}}>
                          {nFiles[cat].map(f=>(
                            <div key={f.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 8px",background:"#f5efe6",borderRadius:6,borderLeft:"3px solid #c4622d"}}>
                              <span style={{fontSize:11}}>{f.name}</span>
                              <button onClick={()=>setNFiles(p=>({...p,[cat]:p[cat].filter(x=>x.id!==f.id)}))} style={{fontSize:11,color:"#a89880"}}>✕</button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              {(nFiles.worldview.length>0||nFiles.settings.length>0||nFiles.scenario.length>0)&&(
                <div style={{display:"grid",gridTemplateColumns:(nFiles.worldview.length>0||nFiles.settings.length>0)&&nFiles.scenario.length>0?"1fr 1fr":"1fr",gap:8}}>
                  {(nFiles.worldview.length>0||nFiles.settings.length>0)&&(
                    <button onClick={()=>onBuild("ws")} style={{padding:"12px",borderRadius:10,border:"1px solid "+(nBuilt.ws?"rgba(45,122,86,.3)":"#ede4d8"),background:nBuilt.ws?"#e8f4ee":"#fff",fontSize:12,fontWeight:600,color:nBuilt.ws?"#2d7a56":"#2c2416",boxShadow:"0 2px 8px rgba(44,36,22,.06)",transition:"all .2s"}}>
                      {nBuilt.ws?"✅ 세계관·설정 분석 완료":"🌍📋 세계관·설정 분석 준비하기"}
                    </button>
                  )}
                  {nFiles.scenario.length>0&&(
                    <button onClick={()=>onBuild("sc")} style={{padding:"12px",borderRadius:10,border:"1px solid "+(nBuilt.sc?"rgba(45,122,86,.3)":"#ede4d8"),background:nBuilt.sc?"#e8f4ee":"#fff",fontSize:12,fontWeight:600,color:nBuilt.sc?"#2d7a56":"#2c2416",boxShadow:"0 2px 8px rgba(44,36,22,.06)",transition:"all .2s"}}>
                      {nBuilt.sc?"✅ 시나리오 분석 완료":"🎬 시나리오 분석 준비하기"}
                    </button>
                  )}
                </div>
              )}
              {(nBuilt.ws||nBuilt.sc)&&(
                <button onClick={onNewAnalyze} style={{width:"100%",padding:"16px",borderRadius:12,background:"#c4622d",color:"#fff",fontSize:14,fontWeight:700,boxShadow:"0 4px 20px rgba(196,98,45,.3)",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-1px)"}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)"}}>
                  🔍 모순 탐지 시작하기
                </button>
              )}
            </div>
          )}

          {/* 기존 프로젝트 */}
          {!isNew&&activeProj&&(
            <div className="fade" style={{display:"flex",flexDirection:"column",gap:14,height:"calc(100vh - 96px)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <h2 style={{fontFamily:"'Noto Serif KR',serif",fontSize:20,fontWeight:700}}>{activeProj.name}</h2>
                  <p style={{fontSize:11,color:"#a89880",marginTop:2}}>{activeProj.date} 분석</p>
                </div>
                <button onClick={()=>setShowAi(!showAi)} style={{padding:"10px 18px",borderRadius:10,background:showAi?"#c4622d":"#fff",border:"1px solid #c4622d",color:showAi?"#fff":"#c4622d",fontSize:12,fontWeight:700,boxShadow:"0 2px 10px rgba(196,98,45,.15)",transition:"all .2s",display:"flex",alignItems:"center",gap:6}}
                  onMouseEnter={e=>{if(!showAi)e.currentTarget.style.background="#fdeee6"}}
                  onMouseLeave={e=>{if(!showAi)e.currentTarget.style.background="#fff"}}>
                  🤖 {showAi?"AI 질문 닫기":"AI에게 질문하기"}
                </button>
              </div>

              <div style={{display:"flex",gap:4}}>
                {[{key:"overview",label:"📊 개요"},{key:"contradictions",label:"⚠️ 모순"+(ct.length>0?" ("+ct.length+"건)":"")},{key:"versions",label:"📝 수정 이력"}].map(t=>(
                  <button key={t.key} onClick={()=>setTab(t.key)} style={{padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:600,color:tab===t.key?"#c4622d":"#a89880",background:tab===t.key?"#fdeee6":"transparent",border:tab===t.key?"1px solid rgba(196,98,45,.2)":"1px solid transparent",transition:"all .15s"}}>
                    {t.label}
                  </button>
                ))}
              </div>

              <div style={{flex:1,overflow:"auto",display:"grid",gridTemplateColumns:showAi?"1fr 360px":"1fr",gap:14}}>
                <div style={{overflow:"auto",display:"flex",flexDirection:"column",gap:12}}>

                  {tab==="overview"&&(
                    <>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                        {[{label:"등장인물",value:activeProj.kb.characters,icon:"👥",color:"#c4622d"},{label:"주요 사실",value:activeProj.kb.facts,icon:"📝",color:"#c47c1a"},{label:"인물 관계",value:activeProj.kb.relationships,icon:"🔗",color:"#2d7a56"},{label:"주요 사건",value:activeProj.kb.events,icon:"🎬",color:"#7c5cbf"}].map(x=>(
                          <div key={x.label} style={{background:"#fff",border:"1px solid #ede4d8",borderRadius:12,padding:"12px 10px",textAlign:"center",boxShadow:"0 2px 8px rgba(44,36,22,.06)"}}>
                            <div style={{fontSize:20,marginBottom:4}}>{x.icon}</div>
                            <div style={{fontSize:22,fontWeight:700,color:x.color,fontFamily:"'Noto Serif KR',serif"}}>{x.value}</div>
                            <div style={{fontSize:10,color:"#a89880",marginTop:2}}>{x.label}</div>
                          </div>
                        ))}
                      </div>
                      {activeProj.sources?.length>0&&(
                        <div style={{background:"#fff",border:"1px solid #ede4d8",borderRadius:12,padding:16,boxShadow:"0 2px 8px rgba(44,36,22,.06)"}}>
                          <div style={{fontSize:12,fontWeight:600,marginBottom:10}}>📂 등록된 파일</div>
                          {activeProj.sources.map(s=>{
                            const c=catInfo[s.cat];
                            return(
                              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"#f5efe6",borderRadius:8,marginBottom:4}}>
                                <span style={{fontSize:16}}>{c?.icon||"📄"}</span>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:12,fontWeight:500}}>{s.n}</div>
                                  <div style={{fontSize:10,color:"#a89880"}}>{c?.label} · 인물 {s.ent}명 · 사실 {s.fct}건 파악</div>
                                </div>
                                <span style={{fontSize:10,color:"#2d7a56",fontWeight:600}}>✓ 완료</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                      {ct.length===0&&<button onClick={onAnalyze} style={{width:"100%",padding:"14px",borderRadius:12,background:"#c4622d",color:"#fff",fontSize:13,fontWeight:700,boxShadow:"0 4px 20px rgba(196,98,45,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>🔍 모순 탐지 시작하기</button>}
                      {ct.length>0&&(
                        <div style={{background:"#fdeaea",border:"1px solid rgba(184,50,50,.2)",borderRadius:12,padding:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:700,color:"#b83232"}}>{ct.length}건의 모순이 발견됐어요</div>
                            <div style={{fontSize:11,color:"#a89880",marginTop:2}}>{counts.high}건 중요, {counts.medium}건 확인 필요</div>
                          </div>
                          <button onClick={()=>setTab("contradictions")} style={{fontSize:12,fontWeight:600,color:"#b83232",padding:"8px 16px",borderRadius:8,border:"1px solid rgba(184,50,50,.25)",background:"#fff"}}>결과 보기 →</button>
                        </div>
                      )}
                    </>
                  )}

                  {tab==="contradictions"&&(
                    <>
                      {staged.length>0&&(
                        <div className="fade" style={{background:"#e8f4ee",border:"1px solid rgba(45,122,86,.2)",borderRadius:12,padding:14,marginBottom:4}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                            <div style={{fontSize:13,fontWeight:700,color:"#2d7a56",display:"flex",alignItems:"center",gap:6}}>
                              ✅ 수정 대기 중 <span style={{fontSize:11,background:"#2d7a56",color:"#fff",padding:"1px 7px",borderRadius:10}}>{staged.length}건</span>
                            </div>
                            <div style={{display:"flex",gap:6}}>
                              <button onClick={onClear} style={{fontSize:11,color:"#a89880",padding:"5px 10px",borderRadius:6,border:"1px solid #ede4d8",background:"#fff"}}>취소</button>
                              <button onClick={onPush} style={{fontSize:11,fontWeight:700,color:"#fff",background:"#2d7a56",padding:"5px 14px",borderRadius:6}}>📤 원고에 반영하기</button>
                            </div>
                          </div>
                          {staged.map(s=>(
                            <div key={s.id} style={{background:"rgba(255,255,255,.6)",borderRadius:8,padding:"8px 10px",marginBottom:4,fontSize:11}}>
                              <span style={{color:"#b83232"}}>수정 전: </span><span style={{color:"#a89880"}}>{(s.ot||"").slice(0,50)}...</span><br/>
                              <span style={{color:"#2d7a56"}}>수정 후: </span><span>{(s.fixedText||"").slice(0,50)}...</span>
                            </div>
                          ))}
                        </div>
                      )}
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {[{key:"all",label:"전체",cnt:counts.all},{key:"high",label:"🔴 중요",cnt:counts.high},{key:"medium",label:"🟡 확인 필요",cnt:counts.medium}].map(f=>(
                          <button key={f.key} onClick={()=>setFilter(f.key)} style={{padding:"5px 12px",borderRadius:6,fontSize:11,fontWeight:600,color:filter===f.key?"#2c2416":"#a89880",background:filter===f.key?"#fff":"transparent",border:filter===f.key?"1px solid #ede4d8":"1px solid transparent",boxShadow:filter===f.key?"0 2px 8px rgba(44,36,22,.06)":"none"}}>
                            {f.label}{f.cnt>0?" "+f.cnt:""}
                          </button>
                        ))}
                      </div>
                      {fd.map(item=>{
                        const open=openCards[item.id];
                        const editing=editCards[item.id];
                        const isStaged=sids.has(item.id);
                        const ls={high:{bg:"#fdeaea",border:"rgba(184,50,50,.2)",badge:"#c0392b",label:"🔴 중요 모순"},medium:{bg:"#fef3db",border:"rgba(196,124,26,.2)",badge:"#e67e22",label:"🟡 확인 필요"}}[item.level]||{bg:"#e8f4ee",border:"rgba(45,122,86,.2)",badge:"#27ae60",label:"🟢 참고"};
                        return(
                          <div key={item.id} style={{background:ls.bg,border:"1px solid "+ls.border,borderRadius:14,overflow:"hidden",opacity:isStaged?.5:1}}>
                            <button onClick={()=>setOpenCards(p=>({...p,[item.id]:!p[item.id]}))} style={{width:"100%",padding:"14px 16px",textAlign:"left",display:"flex",alignItems:"flex-start",gap:10}}>
                              <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:6,background:ls.badge,color:"#fff",flexShrink:0,marginTop:2}}>{ls.label}</span>
                              <div style={{flex:1}}>
                                <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{item.char} — {item.type}</div>
                                <div style={{fontSize:12,color:"#6b5c47"}}>{item.summary}</div>
                                {isStaged&&<span style={{fontSize:10,color:"#2d7a56",fontWeight:600,marginTop:4,display:"block"}}>✅ 수정 대기 중</span>}
                              </div>
                              <span style={{color:"#a89880",fontSize:12}}>{open?"▲":"▼"}</span>
                            </button>
                            {open&&(
                              <div className="fade" style={{padding:"0 16px 16px",display:"flex",flexDirection:"column",gap:12}}>
                                <div style={{background:"rgba(255,255,255,.6)",borderRadius:10,padding:12,borderLeft:"3px solid "+ls.badge}}>
                                  <div style={{fontSize:10,fontWeight:600,color:"#a89880",marginBottom:4}}>📣 문제의 대사·장면</div>
                                  <p style={{fontSize:13,fontStyle:"italic",lineHeight:1.7}}>"{item.quote}"</p>
                                </div>
                                <div>
                                  <div style={{fontSize:10,fontWeight:600,color:"#a89880",marginBottom:4}}>🔍 왜 모순인가요?</div>
                                  <p style={{fontSize:12,color:"#6b5c47",lineHeight:1.8}}>{item.explain}</p>
                                </div>
                                {item.evidence.map((e,i)=>(
                                  <div key={i} style={{background:"rgba(255,255,255,.5)",borderRadius:8,padding:"8px 10px"}}>
                                    <div style={{fontSize:10,color:"#c4622d",fontWeight:600,marginBottom:2}}>📄 {e.src} — {e.loc}</div>
                                    <p style={{fontSize:11,color:"#6b5c47"}}>{e.text}</p>
                                  </div>
                                ))}
                                <div style={{background:"#e8f4ee",border:"1px solid rgba(45,122,86,.15)",borderRadius:10,padding:12}}>
                                  <div style={{fontSize:10,fontWeight:600,color:"#2d7a56",marginBottom:4}}>✏️ 수정 제안</div>
                                  <p style={{fontSize:12,lineHeight:1.7}}>{item.suggestion}</p>
                                </div>
                                {item.needsAuthor&&(
                                  <div style={{background:"rgba(124,92,191,.06)",border:"1px solid rgba(124,92,191,.15)",borderRadius:10,padding:12}}>
                                    <div style={{fontSize:10,fontWeight:600,color:"#7c5cbf",marginBottom:6}}>💬 작가님께 여쭤볼게요</div>
                                    <p style={{fontSize:12,marginBottom:8}}>{item.authorQ}</p>
                                    {authorAnswers[item.id]?(
                                      <div style={{fontSize:12,color:"#7c5cbf",padding:"6px 10px",background:"rgba(124,92,191,.06)",borderRadius:6}}>답변: {authorAnswers[item.id]}</div>
                                    ):(
                                      <div style={{display:"flex",gap:6}}>
                                        <input value={authorInputs[item.id]||""} onChange={e=>setAuthorInputs(p=>({...p,[item.id]:e.target.value}))}
                                          onKeyDown={e=>{if(e.key==="Enter"&&(authorInputs[item.id]||"").trim())setAuthorAnswers(p=>({...p,[item.id]:authorInputs[item.id]}))}}
                                          placeholder="의도를 알려주세요..."
                                          style={{flex:1,background:"#fff",border:"1px solid #ede4d8",borderRadius:8,padding:"8px 12px",fontSize:12,outline:"none"}}/>
                                        <button onClick={()=>{if((authorInputs[item.id]||"").trim())setAuthorAnswers(p=>({...p,[item.id]:authorInputs[item.id]}))}}
                                          style={{padding:"8px 14px",background:"#7c5cbf",color:"#fff",borderRadius:8,fontSize:12,fontWeight:600}}>전송</button>
                                      </div>
                                    )}
                                  </div>
                                )}
                                {!isStaged&&(
                                  <div style={{borderTop:"1px solid rgba(44,36,22,.06)",paddingTop:10}}>
                                    {editing?(
                                      <div>
                                        <div style={{fontSize:10,fontWeight:600,color:"#a89880",marginBottom:6}}>✍️ 수정할 내용을 입력하세요</div>
                                        <textarea value={fixTexts[item.id]||item.ot||""} onChange={e=>setFixTexts(p=>({...p,[item.id]:e.target.value}))} rows={3}
                                          style={{width:"100%",background:"#fff",border:"1px solid #ede4d8",borderRadius:8,padding:"10px 12px",fontSize:12,outline:"none",resize:"none",lineHeight:1.7}}/>
                                        <div style={{display:"flex",gap:6,marginTop:8,justifyContent:"flex-end"}}>
                                          <button onClick={()=>setEditCards(p=>({...p,[item.id]:false}))} style={{fontSize:11,color:"#a89880",padding:"6px 12px",borderRadius:6,border:"1px solid #ede4d8"}}>취소</button>
                                          <button onClick={()=>{onStage(item);setEditCards(p=>({...p,[item.id]:false}))}}
                                            style={{fontSize:11,fontWeight:600,color:"#fff",background:"#2d7a56",padding:"6px 14px",borderRadius:6}}>✓ 수정 저장하기</button>
                                        </div>
                                      </div>
                                    ):(
                                      <button onClick={()=>setEditCards(p=>({...p,[item.id]:true}))} style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #ede4d8",background:"#fff",fontSize:12,color:"#6b5c47",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .15s"}}
                                        onMouseEnter={e=>{e.currentTarget.style.borderColor="#c4622d";e.currentTarget.style.color="#c4622d"}}
                                        onMouseLeave={e=>{e.currentTarget.style.borderColor="#ede4d8";e.currentTarget.style.color="#6b5c47"}}>
                                        ✏️ 이 부분 직접 수정하기
                                      </button>
                                    )}
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                      {fd.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#a89880"}}><div style={{fontSize:32,marginBottom:8}}>✨</div><div style={{fontSize:13}}>선택한 조건의 모순이 없어요!</div></div>}
                    </>
                  )}

                  {tab==="versions"&&(
                    <div style={{paddingLeft:24,position:"relative"}}>
                      <div style={{position:"absolute",left:8,top:8,bottom:8,width:2,background:"#ede4d8",borderRadius:1}}></div>
                      {(activeProj.versions||[]).map((v,i)=>(
                        <div key={v.id} style={{position:"relative",marginBottom:14}}>
                          <div style={{position:"absolute",left:-20,top:6,width:10,height:10,borderRadius:"50%",background:i===0?"#c4622d":"#ede4d8",border:i===0?"2px solid rgba(196,98,45,.25)":"2px solid #fff"}}></div>
                          <div style={{background:"#fff",border:"1px solid "+(i===0?"rgba(196,98,45,.2)":"#ede4d8"),borderRadius:10,padding:12,boxShadow:"0 2px 8px rgba(44,36,22,.06)"}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                              <div style={{display:"flex",alignItems:"center",gap:6}}>
                                <span style={{fontSize:12,fontWeight:700,color:i===0?"#c4622d":"#6b5c47"}}>{v.label}</span>
                                {i===0&&<span style={{fontSize:9,background:"#fdeee6",color:"#c4622d",padding:"1px 6px",borderRadius:4}}>최신</span>}
                                {v.fixes>0&&<span style={{fontSize:9,background:"#fef3db",color:"#c47c1a",padding:"1px 6px",borderRadius:4}}>{v.fixes}건 수정</span>}
                              </div>
                              <span style={{fontSize:10,color:"#a89880"}}>{v.date}</span>
                            </div>
                            <p style={{fontSize:11,color:"#6b5c47"}}>{v.desc}</p>
                            <div style={{display:"flex",gap:4,marginTop:8}}>
                              <button style={{fontSize:10,color:"#a89880",padding:"3px 8px",borderRadius:4,border:"1px solid #ede4d8"}}>원고 보기</button>
                              {i>0&&<button style={{fontSize:10,color:"#a89880",padding:"3px 8px",borderRadius:4,border:"1px solid #ede4d8"}}>이전 버전과 비교</button>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {showAi&&(
                  <div style={{background:"#fff",border:"1px solid #ede4d8",borderRadius:14,display:"flex",flexDirection:"column",boxShadow:"0 2px 8px rgba(44,36,22,.06)"}}>
                    <div style={{padding:"12px 16px",borderBottom:"1px solid #ede4d8",background:"#fff8f0",borderRadius:"14px 14px 0 0",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:"#c4622d",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
                      <div>
                        <div style={{fontSize:12,fontWeight:700}}>AI에게 질문하기</div>
                        <div style={{fontSize:9,color:"#a89880"}}>작품 지식 그래프 기반</div>
                      </div>
                    </div>
                    <div style={{flex:1,overflow:"auto",padding:12,display:"flex",flexDirection:"column",gap:8,minHeight:200}}>
                      {aiMsgs.map((m,i)=>(
                        <div key={i} style={{alignSelf:m.role==="u"?"flex-end":"flex-start",maxWidth:"88%",background:m.role==="u"?"#fdeee6":m.role==="s"?"#f5efe6":"#e8f4ee",border:"1px solid #ede4d8",borderRadius:10,padding:"8px 12px"}}>
                          <p style={{fontSize:11,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{m.text}</p>
                        </div>
                      ))}
                      {aiLoading&&<div style={{alignSelf:"flex-start",color:"#a89880",fontSize:11,fontStyle:"italic"}}>생각하는 중...</div>}
                      <div ref={aiEndRef}></div>
                    </div>
                    <div style={{padding:10,borderTop:"1px solid #ede4d8",display:"flex",gap:6}}>
                      <input value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendAi()}} placeholder="예: A와 B의 관계가 어떻게 되나요?"
                        style={{flex:1,background:"#fff8f0",border:"1px solid #ede4d8",borderRadius:8,padding:"8px 12px",fontSize:11,outline:"none"}}/>
                      <button onClick={sendAi} disabled={!aiInput.trim()||aiLoading}
                        style={{padding:"8px 14px",borderRadius:8,background:aiInput.trim()&&!aiLoading?"#c4622d":"#f5efe6",color:aiInput.trim()&&!aiLoading?"#fff":"#a89880",fontSize:12,fontWeight:600,transition:"all .15s"}}>
                        전송
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {!isNew&&!activeProj&&(
            <div style={{textAlign:"center",padding:"80px 0",color:"#a89880"}}>
              <div style={{fontSize:40,marginBottom:12}}>📖</div>
              <p style={{fontSize:14}}>작품을 선택하거나 새 작품을 분석해보세요</p>
            </div>
          )}
        </main>
      </div>

      {loading&&<Loading step={loading.step} steps={loading.steps} title={loading.title}/>}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
